<!DOCTYPE html>
<html>
<head>
    <title>AutoGLM Scrcpy Player (Debug)</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: monospace; }
        canvas { max-width: 100%; max-height: 100%; background: #000; border: 1px solid #333; }
        #overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; pointer-events: none; border: 1px solid #555; }
        .log { font-size: 10px; margin-bottom: 2px; }
        .stat { font-weight: bold; color: #ff0; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="log">Status: <span id="status" class="stat">Initializing...</span></div>
        <div class="log">Packets: <span id="pkts" class="stat">0</span></div>
        <div class="log">Resolution: <span id="res" class="stat">N/A</span></div>
        <hr/>
        <div id="logs"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const pkts = document.getElementById('pkts');
        const res = document.getElementById('res');
        const logs = document.getElementById('logs');
        
        let decoder = null;
        let packetCount = 0;
        let renderCount = 0;

        function addLog(msg) {
            console.log(msg);
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('logHandler', msg);
            }
            const div = document.createElement('div');
            div.className = 'log';
            div.textContent = `> ${msg}`;
            logs.appendChild(div);
            if (logs.childNodes.length > 8) logs.removeChild(logs.firstChild);
        }

        async function initDecoder() {
            status.textContent = 'Configuring Decoder...';
            decoder = new VideoDecoder({
                output: (frame) => {
                    if (canvas.width !== frame.displayWidth) {
                        canvas.width = frame.displayWidth;
                        canvas.height = frame.displayHeight;
                        res.textContent = `${canvas.width}x${canvas.height}`;
                        addLog(`Render Start: ${res.textContent}`);
                    }
                    ctx.drawImage(frame, 0, 0);
                    frame.close();
                    renderCount++;
                    status.textContent = `Streaming (${renderCount} rendered)`;
                },
                error: (e) => {
                    addLog('Decoder Error: ' + e.message);
                    status.textContent = 'Decoder Error';
                }
            });

            const config = {
                codec: 'avc1.42E01E', 
                optimizeForLatency: true
            };
            decoder.configure(config);
            addLog('Decoder Ready (avc1.42E01E)');
        }

        function connect() {
            const url = new URLSearchParams(window.location.search).get('ws');
            addLog(`Connecting: ${url}`);
            const ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                status.textContent = 'WS Connected';
                initDecoder();
            };

            ws.onmessage = (event) => {
                packetCount++;
                pkts.textContent = packetCount;

                if (!decoder || decoder.state !== 'configured') return;

                const data = new Uint8Array(event.data);
                try {
                    const chunk = new EncodedVideoChunk({
                        type: isKeyFrame(data) ? 'key' : 'delta',
                        timestamp: performance.now() * 1000,
                        data: data
                    });
                    decoder.decode(chunk);
                } catch (e) {
                    if (packetCount % 100 === 0) addLog('Decode Exception');
                }
            };

            ws.onclose = () => {
                status.textContent = 'Disconnected';
                setTimeout(() => location.reload(), 2000);
            };
        }

        function isKeyFrame(data) {
            // Very lenient check: if it looks like SPS or IDR
            for (let i = 0; i < 32; i++) {
                if (data[i] === 0 && data[i+1] === 0 && (data[i+2] === 1 || (data[i+2] === 0 && data[i+3] === 1))) {
                    const type = data[i + (data[i+2] === 1 ? 3 : 4)] & 0x1F;
                    if (type === 7 || type === 5) return true;
                }
            }
            return false;
        }

        connect();
    </script>
</body>
</html>
